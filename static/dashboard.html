<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — SnapLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#13213a;--muted:#64748b;--line:#dbe3ee;--blue:#1769d1;--blue-dark:#1059b5;--soft:#f4f8ff;--red:#b42335;--green:#087b57}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--ink);font-family:"DM Sans",system-ui,sans-serif}.shell{width:min(1040px,calc(100% - 40px));margin:auto}nav{height:76px;display:flex;align-items:center;justify-content:space-between}.brand{display:inline-flex;align-items:center;gap:10px;color:var(--ink);font-size:1.2rem;font-weight:700;text-decoration:none}.mark{width:34px;height:34px;display:grid;place-items:center;border-radius:9px;background:var(--blue);color:#fff}.profile-menu{position:relative}.profile-trigger{display:flex;align-items:center;gap:10px;border:0;padding:0;background:transparent;color:var(--ink);cursor:pointer;font:600 .92rem inherit}.avatar{width:46px;height:46px;display:grid;place-items:center;overflow:hidden;border:1px solid var(--line);border-radius:50%;background:var(--blue);color:#fff;font-size:.92rem}.avatar img{width:100%;height:100%;object-fit:cover}.profile-popover{position:absolute;top:56px;right:0;z-index:5;width:220px;overflow:hidden;border:1px solid var(--line);border-radius:11px;background:#fff;box-shadow:0 14px 34px rgba(19,33,58,.16)}.profile-summary{padding:14px 15px;border-bottom:1px solid var(--line)}.profile-summary strong{display:block;font-size:.92rem}.profile-summary span{display:block;overflow:hidden;margin-top:3px;color:var(--muted);font-size:.78rem;text-overflow:ellipsis;white-space:nowrap}.profile-popover a,.profile-popover button{display:block;width:100%;border:0;padding:11px 15px;color:var(--ink);background:#fff;cursor:pointer;font:500 .9rem inherit;text-align:left;text-decoration:none}.profile-popover a:hover,.profile-popover button:hover{background:#f5f8fc}.profile-popover button{color:var(--red)}main{padding:38px 0 80px}.eyebrow{margin:0 0 8px;color:var(--blue);font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}h1{margin:0;font-size:2.35rem;letter-spacing:-.04em}.lead{margin:10px 0 28px;color:var(--muted)}.create-card,.list-card{background:#fff;border:1px solid var(--line);border-radius:13px;box-shadow:0 8px 24px rgba(32,57,88,.04)}.create-card{padding:22px}.create-card h2{margin:0 0 14px;font-size:1.08rem}.create-form{display:flex;gap:10px}.create-form input,.edit-form input{min-width:0;flex:1;border:1px solid #cbd6e4;border-radius:8px;padding:13px;color:var(--ink);font:inherit;outline:0}.create-form input:focus,.edit-form input:focus{border-color:var(--blue);box-shadow:0 0 0 3px #dcecff}.button{border:0;border-radius:8px;padding:12px 16px;background:var(--blue);color:#fff;cursor:pointer;font:600 .92rem inherit}.button:hover{background:var(--blue-dark)}.button:disabled{opacity:.6;cursor:wait}.message{min-height:20px;margin:11px 0 0;color:var(--red);font-size:.86rem}.list-card{margin-top:23px;padding:25px}.list-header{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:12px}.list-header h2{margin:0;font-size:1.2rem}.list-header span{color:var(--muted);font-size:.88rem}.link-row{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:17px 0;border-top:1px solid #edf1f6}.link-info{min-width:0}.short-link{display:block;overflow:hidden;color:var(--blue);font-weight:600;text-decoration:none;text-overflow:ellipsis;white-space:nowrap}.destination{overflow:hidden;margin-top:4px;color:var(--muted);font-size:.84rem;text-overflow:ellipsis;white-space:nowrap}.row-actions{display:flex;gap:8px;flex:none}.secondary,.danger{border:1px solid var(--line);border-radius:7px;padding:8px 10px;background:#fff;cursor:pointer;font:600 .82rem inherit}.secondary{color:var(--blue);border-color:#bcd4f2}.danger{color:var(--red);border-color:#f1c7ce}.empty{padding:38px 12px;color:var(--muted);text-align:center}.pagination{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:23px}.pagination button{border:1px solid var(--line);border-radius:7px;padding:8px 12px;background:#fff;color:var(--ink);cursor:pointer;font:600 .85rem inherit}.pagination button:disabled{opacity:.45;cursor:not-allowed}.pagination span{min-width:100px;color:var(--muted);font-size:.86rem;text-align:center}dialog{width:min(560px,calc(100% - 30px));border:0;border-radius:13px;padding:0;box-shadow:0 22px 70px rgba(15,23,42,.28)}dialog::backdrop{background:rgba(15,23,42,.42)}.dialog-card{padding:25px}.dialog-card h2{margin:0 0 8px}.dialog-card p{margin:0 0 18px;color:var(--muted);font-size:.9rem}.edit-form{display:grid;gap:14px}.dialog-actions{display:flex;justify-content:flex-end;gap:10px}.cancel{border:1px solid var(--line);border-radius:8px;padding:11px 15px;background:#fff;color:var(--ink);cursor:pointer;font:600 .9rem inherit}@media(max-width:620px){.shell{width:min(100% - 28px,1040px)}.create-form{flex-direction:column}.create-form input,.create-form button{width:100%}.link-row{align-items:flex-start;flex-direction:column}.row-actions{width:100%}.row-actions button{flex:1}.profile-trigger span:last-child{display:none}}
  </style>
</head>
<body>
  <div class="shell"><nav><a class="brand" href="/"><span class="mark">↗</span>SnapLink</a><div class="profile-menu" id="profile-menu"><button class="profile-trigger" id="profile-trigger" type="button" aria-label="Open account menu" aria-expanded="false"><span class="avatar"><img id="nav-avatar" alt="" hidden><span id="nav-initials"></span></span><span id="nav-username"></span></button><div class="profile-popover" id="profile-popover" hidden><div class="profile-summary"><strong id="profile-name"></strong><span id="profile-username"></span></div><a href="/dashboard">Dashboard</a><a href="/settings">Settings</a><button id="signout-button" type="button">Sign out</button></div></div></nav><main><p class="eyebrow">Private workspace</p><h1>Your links</h1><p class="lead">Create, update, and remove links from your private dashboard.</p><section class="create-card"><h2>Create a new link</h2><form class="create-form" id="create-form"><input id="new-url" type="url" placeholder="https://example.com/a-very-long-link" autocomplete="off" required><button class="button" id="create-button" type="submit">Create link</button></form><p class="message" id="create-message"></p></section><section class="list-card"><div class="list-header"><h2>Saved links</h2><span id="link-count"></span></div><div id="link-list"></div><div class="pagination"><button id="previous-page" type="button">Previous</button><span id="page-label"></span><button id="next-page" type="button">Next</button></div></section></main></div><dialog id="edit-dialog"><form class="dialog-card" id="edit-form"><h2>Edit destination</h2><p>The short link stays the same; only its destination changes.</p><input id="edit-url" type="url" required><p class="message" id="edit-message"></p><div class="dialog-actions"><button class="cancel" id="cancel-edit" type="button">Cancel</button><button class="button" id="save-edit" type="submit">Save changes</button></div></form></dialog>
  <script>
    let page = 1; let totalPages = 1; let editingCode = null;
    const list = document.getElementById('link-list'); const createMessage = document.getElementById('create-message');
    function escapeHtml(value) { return String(value).replace(/[&<>"']/g, character => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[character])); }
    function detailMessage(detail) { if (typeof detail === 'string') return detail; if (Array.isArray(detail)) return detail.map(item => item.msg || 'Check the form.').join(' '); return 'Something went wrong.'; }
    async function request(url, options = {}) { const response = await fetch(url, options); const data = await response.json().catch(() => ({})); if (!response.ok) throw new Error(detailMessage(data.detail)); return data; }
    function renderProfile(user) { const initials = `${user.first_name[0] || ''}${user.last_name[0] || ''}`.toUpperCase() || user.username.slice(0,2).toUpperCase(); document.getElementById('nav-initials').textContent = initials; document.getElementById('nav-username').textContent = `@${user.username}`; document.getElementById('profile-name').textContent = `${user.first_name} ${user.last_name}`.trim(); document.getElementById('profile-username').textContent = `@${user.username}`; if (user.avatar_url) { const image = document.getElementById('nav-avatar'); image.src = user.avatar_url; image.hidden = false; document.getElementById('nav-initials').hidden = true; } }
    async function loadProfile() { try { renderProfile(await request('/auth/me')); } catch (_) { location.assign('/login'); } }
    async function copyText(value, button) { try { if (navigator.clipboard && window.isSecureContext) await navigator.clipboard.writeText(value); else { const area = document.createElement('textarea'); area.value = value; area.style.cssText = 'position:fixed;opacity:0'; document.body.append(area); area.select(); const copied = document.execCommand('copy'); area.remove(); if (!copied) throw new Error(); } const label = button.textContent; button.textContent = 'Copied!'; setTimeout(() => { button.textContent = label; }, 1600); } catch (_) { button.textContent = 'Copy failed'; setTimeout(() => { button.textContent = 'Copy'; }, 1600); } }
    function renderLinks(data) { page = data.page; totalPages = data.total_pages; document.getElementById('link-count').textContent = `${data.total} total`; list.innerHTML = data.items.length ? data.items.map(link => `<article class="link-row"><div class="link-info"><a class="short-link" href="${escapeHtml(link.short_url)}" target="_blank" rel="noopener">${escapeHtml(link.short_url)}</a><div class="destination">${escapeHtml(link.original_url)}</div></div><div class="row-actions"><button class="secondary" type="button" data-copy="${escapeHtml(link.short_url)}">Copy</button><button class="secondary" type="button" data-edit="${escapeHtml(link.short_code)}" data-url="${escapeHtml(link.original_url)}">Edit</button><button class="danger" type="button" data-delete="${escapeHtml(link.short_code)}">Delete</button></div></article>`).join('') : '<p class="empty">No saved links yet. Create your first one above.</p>'; document.getElementById('previous-page').disabled = page <= 1; document.getElementById('next-page').disabled = page >= totalPages; document.getElementById('page-label').textContent = `Page ${page} of ${totalPages}`; }
    async function loadLinks(targetPage = page) { try { renderLinks(await request(`/account/links?page=${targetPage}&page_size=10`)); } catch (error) { list.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`; } }
    document.getElementById('create-form').addEventListener('submit', async event => { event.preventDefault(); const submit = document.getElementById('create-button'); submit.disabled = true; createMessage.textContent = ''; try { await request('/account/links', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:document.getElementById('new-url').value.trim()})}); event.currentTarget.reset(); await loadLinks(1); } catch (error) { createMessage.textContent = error.message; } finally { submit.disabled = false; } });
    list.addEventListener('click', async event => { const target = event.target.closest('button'); if (!target) return; if (target.dataset.copy) { copyText(target.dataset.copy, target); return; } if (target.dataset.edit) { editingCode = target.dataset.edit; document.getElementById('edit-url').value = target.dataset.url; document.getElementById('edit-message').textContent = ''; document.getElementById('edit-dialog').showModal(); return; } if (target.dataset.delete && window.confirm('Delete this short link? This cannot be undone.')) { try { await request(`/account/links/${target.dataset.delete}`, {method:'DELETE'}); await loadLinks(page); } catch (error) { window.alert(error.message); } } });
    document.getElementById('edit-form').addEventListener('submit', async event => { event.preventDefault(); const save = document.getElementById('save-edit'); save.disabled = true; try { await request(`/account/links/${editingCode}`, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:document.getElementById('edit-url').value.trim()})}); document.getElementById('edit-dialog').close(); await loadLinks(page); } catch (error) { document.getElementById('edit-message').textContent = error.message; } finally { save.disabled = false; } });
    document.getElementById('cancel-edit').addEventListener('click', () => document.getElementById('edit-dialog').close()); document.getElementById('previous-page').addEventListener('click', () => loadLinks(page - 1)); document.getElementById('next-page').addEventListener('click', () => loadLinks(page + 1)); document.getElementById('profile-trigger').addEventListener('click', () => { const popover = document.getElementById('profile-popover'); const open = popover.hidden; popover.hidden = !open; document.getElementById('profile-trigger').setAttribute('aria-expanded', String(open)); }); document.addEventListener('click', event => { const menu = document.getElementById('profile-menu'); if (!menu.contains(event.target)) document.getElementById('profile-popover').hidden = true; }); document.getElementById('signout-button').addEventListener('click', async () => { await fetch('/auth/logout',{method:'POST'}); location.assign('/'); }); loadProfile(); loadLinks(1);
  </script>
</body>
</html>
